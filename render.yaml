services:
  # FastAPI backend -> serves the API at api.naijaprep.com.ng
  - type: web
    name: naijaprep-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://naijaprep.com.ng,https://www.naijaprep.com.ng
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: ENV
        value: production
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false

  # React/Vite frontend -> served at naijaprep.com.ng
  - type: web
    name: naijaprep-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://api.naijaprep.com.ng
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
