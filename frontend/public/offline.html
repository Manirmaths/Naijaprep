<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're offline — Burina</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f7fb;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #16172b;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 360px; }
      h1 { font-size: 20px; margin: 16px 0 8px; }
      p { color: #6b6c85; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
      button {
        background: #5b5bf0;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Burina needs a connection the first time it loads on this device. Once you've opened it
        online once, the app shell will work again even with a weak signal.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
