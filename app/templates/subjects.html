 <!-- subjects.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Subject — Naija Prep</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { background:#f8f9fa; font-family:'Poppins',sans-serif; }
    .navbar { box-shadow:0 2px 10px rgba(0,0,0,.08); }
    .grid { max-width: 1100px; margin: 30px auto; }
    .subject-card {
      border:none; border-radius:16px; background:#fff; padding:22px;
      box-shadow:0 4px 14px rgba(0,0,0,.08); transition: transform .2s ease, box-shadow .2s ease;
      text-align:center; height:100%;
    }
    .subject-card:hover { transform: translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.12); }
    .subject-name { font-weight:700; font-size:1.15rem; margin-bottom:6px; }
    .badge-count { font-size:.85rem; }
    .mini-form select { max-width: 110px; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('home') }}">Naija Prep</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="{{ url_for('subjects') }}">Subjects</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container grid">
  <h2 class="text-center fw-bold mt-3">Choose a Subject</h2>
  <p class="text-center text-muted mb-4">Tap a subject to see its topics, or start a quick subject quiz.</p>

  <div class="row g-3">
    {% for s in subjects %}
      <div class="col-6 col-md-4 col-lg-3">
        <div class="subject-card d-flex flex-column justify-content-between">
          <a class="text-decoration-none mb-2" href="{{ url_for('subject_topics', subject=s) }}">
            <div class="subject-name">{{ s }}</div>
            <span class="badge bg-primary badge-count">
              {{ subject_counts.get(s, 0) }} questions
            </span>
          </a>

          <!-- Quick start form (GET -> /quiz) -->
          <form action="{{ url_for('quiz') }}" method="get" class="mini-form mt-2">
            <input type="hidden" name="subject" value="{{ s }}">
            <div class="d-flex gap-2 justify-content-center">
              <select name="n" class="form-select form-select-sm" aria-label="Number of questions">
                <option value="5" selected>5 Qs</option>
                <option value="10">10 Qs</option>
                <option value="20">20 Qs</option>
              </select>
              <select name="difficulty" class="form-select form-select-sm" aria-label="Difficulty">
                <option value="any" selected>Any diff.</option>
                <option value="1">Diff 1</option>
                <option value="2">Diff 2</option>
                <option value="3">Diff 3</option>
                <option value="4">Diff 4</option>
                <option value="5">Diff 5</option>
              </select>
              <button class="btn btn-sm btn-primary" type="submit">Start</button>
            </div>
          </form>
        </div>
      </div>
    {% endfor %}
  </div>

  <div class="text-center mt-4">
    <a href="{{ url_for('jamb_practice') }}" class="btn btn-outline-primary">JAMB Mixed Practice</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
