<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ subject }} — Topics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { background:#f8f9fa; font-family:'Poppins', sans-serif; }
    .wrap { max-width: 900px; margin: 30px auto; }
    .topic-card { border:none; border-radius:14px; background:#fff; box-shadow:0 4px 12px rgba(0,0,0,.08); padding:16px; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('home') }}">Naija Prep</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('subjects') }}">Subjects</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container wrap">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0 fw-bold">{{ subject }} — Topics</h3>
    <a class="btn btn-sm btn-outline-primary" href="{{ url_for('quiz', subject=subject) }}">Quick 5-Q {{ subject }} Quiz</a>
  </div>

  {% if topics %}
    <div class="list-group">
      {% for t in topics %}
        <a class="list-group-item list-group-item-action topic-card mb-2"
           href="{{ url_for('quiz', topic=t.name) }}">
          <div class="d-flex justify-content-between">
            <span>{{ t.name }}</span>
            <span class="badge bg-secondary">{{ t.count }} questions</span>
          </div>
        </a>
      {% endfor %}
    </div>
  {% else %}
    <p class="text-muted">No topics available in this subject yet.</p>
  {% endif %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
